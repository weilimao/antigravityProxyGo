name: Build and Publish Wails App

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0 的 tag 时触发自动打包发布

permissions:
  contents: write # 赋予 Action 往 Releases 写入二进制文件的权限

jobs:
  build:
    name: Build Wails App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest] # 分别在 Windows 和 macOS 镜像中编译

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Wails CLI
        run: |
          go env -w GOPROXY=https://goproxy.io,direct
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # 安装 NSIS 编译器以确保 Windows 下能成功生成安装包
      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install nsis -y
          # 将 NSIS 写入 GITHUB_PATH 确保后续步骤能读取到 makensis 路径
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
        shell: pwsh

      # Windows 打包流程 (NSIS 安装程序)
      - name: Build and Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # 双重保险：在当前 Step 进程的内存中直接追加 PATH 环境变量
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          # windows-latest 镜像内置了 makensis 编译器，直接调用 -nsis 即可
          wails build -nsis -platform windows/amd64
          # 重命名生成产物为美观的名字
          Move-Item -Path "build\bin\antigravity-proxy-amd64-installer.exe" -Destination "build\bin\antigravity-proxy-${{ github.ref_name }}-windows-amd64.exe"
        shell: pwsh

      # macOS 打包流程 (DMG 与 ZIP 包)
      - name: Build and Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          wails build -platform darwin/universal
          
          # 安装 create-dmg 工具
          brew install create-dmg
          
          # 打包为 .dmg 格式的安装镜像
          create-dmg \
            --volname "Antigravity Proxy" \
            --window-size 500 300 \
            --icon-size 100 \
            --icon "antigravity-proxy.app" 100 120 \
            --hide-extension "antigravity-proxy.app" \
            --app-drop-link 300 120 \
            "build/bin/antigravity-proxy-${{ github.ref_name }}-mac-universal.dmg" \
            "build/bin/antigravity-proxy.app"
            
          # 压缩为 .zip 格式的直接运行包
          cd build/bin
          zip -r "antigravity-proxy-${{ github.ref_name }}-mac-universal.zip" "antigravity-proxy.app"
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.os }}
          path: |
            build/bin/*.exe
            build/bin/*.dmg
            build/bin/*.zip

  publish:
    name: Create GitHub Release and Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: 'release-artifacts-*'
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
